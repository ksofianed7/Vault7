services:
  - type: web
    name: vault
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: VAULT_CACHE_DIR
        value: /data/media
      - key: NODE_ENV
        value: production
      # Operator sets this in the dashboard for Instagram support.
      # YouTube and TikTok work WITHOUT this (PO Token provider handles auth).
      - key: VAULT_COOKIES_B64
        sync: false
    disk:
      name: vault-cache
      mountPath: /data
      sizeGB: 1
